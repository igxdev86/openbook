<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sell on OpenBook — see demand before you discount</title>
<meta name="description" content="Verified UK retailers accept buyer orders in bulk at prices that work. 1% per accepted order, credited back if the buyer doesn't complete.">
<meta name="robots" content="noindex">
<link rel="stylesheet" href="/styles.css">
</head>
<body>

<div class="topbar">
  <a class="logo" href="/">OPEN<span>BOOK</span></a>
  <a class="top-link" href="/account.html"><b>My orders</b></a>
</div>

<div class="wrap">
  <div id="app"><div class="empty">Loading…</div></div>
  <div class="foot"><a href="/about" style="color:inherit">What is OpenBook</a> ·
    <a href="/support" style="color:inherit">Support</a> ·
    <a href="/terms" style="color:inherit">Terms</a> ·
    <a href="/privacy" style="color:inherit">Privacy</a><br>
    OpenBook Seller · 1% per accepted order · credited back if the buyer doesn't complete</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="/config.js"></script>
<script>
const app = document.getElementById('app');
let R = null;           // retailer row
let curveCache = {};    // productId -> curve rows
let timers = [];

function fmtWhen(iso){
  const d = new Date(iso);
  return d.toLocaleDateString('en-GB',{day:'numeric',month:'short'}) + ' ' +
         d.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
}

/* ---------- screens ---------- */
function signInScreen(){
  app.innerHTML = `
  <div style="padding:24px 4px 6px;text-align:center">
    <h1 style="font-size:1.35rem;font-weight:800">Sell on OpenBook</h1>
    <p style="font-size:.8rem;color:var(--ink-soft);margin-top:8px;line-height:1.55">
      See live buyer demand on your stock and accept orders in bulk at prices that work for you.
      Buyers check out on <b>your</b> site. You pay 1% per accepted order — credited straight back
      if the buyer doesn't complete.</p>
  </div>
  <div class="card" style="padding:16px;margin-top:8px">
    <div class="field"><label for="em">Business email</label>
      <input type="email" id="em" placeholder="you@yourcompany.co.uk"></div>
    <button class="btn btn-dark" style="width:100%;margin-top:12px" id="go">Send sign-in link</button>
    <div class="msg" id="m"></div>
  </div>`;
  document.getElementById('go').onclick = async () => {
    const msg = document.getElementById('m'); msg.className='msg';
    const email = document.getElementById('em').value.trim();
    if (!email){ msg.textContent='Enter your email.'; msg.className='msg err'; return; }
    const { error } = await sb.auth.signInWithOtp({ email,
      options: { emailRedirectTo: location.origin + '/seller.html' } });
    if (error){ msg.textContent = error.message; msg.className='msg err'; return; }
    msg.textContent = 'Link sent — check your inbox and come back.'; msg.className='msg ok';
  };
}

function applyScreen(){
  app.innerHTML = `
  <div style="padding:22px 4px 6px">
    <h1 style="font-size:1.25rem;font-weight:800">Open a seller account</h1>
    <p style="font-size:.78rem;color:var(--ink-soft);margin-top:6px;line-height:1.55">
      Sellers must be UK-registered retail businesses. We verify every application by hand —
      you'll be trading within a day.</p>
  </div>
  <div class="card" style="padding:16px;margin-top:6px">
    <div class="field"><label>Company name</label><input id="f_name" placeholder="KitchenDirect Ltd"></div>
    <div class="field"><label>Companies House number</label><input id="f_ch" placeholder="12345678"></div>
    <div class="field"><label>Website</label><input id="f_web" placeholder="https://yourstore.co.uk"></div>
    <div class="field"><label>Checkout domain <span style="text-transform:none;letter-spacing:0">(where buyers will pay)</span></label>
      <input id="f_dom" placeholder="yourstore.co.uk"></div>
    <button class="btn btn-buy" style="width:100%;margin-top:14px" id="apply">Apply to sell</button>
    <div class="msg" id="m"></div>
  </div>`;
  document.getElementById('apply').onclick = async () => {
    const msg = document.getElementById('m'); msg.className='msg';
    const f = id => document.getElementById(id).value.trim();
    if (!f('f_name') || !f('f_web')){ msg.textContent='Company name and website are required.'; msg.className='msg err'; return; }
    const { error } = await applyRetailer({ company_name: f('f_name'),
      companies_house_no: f('f_ch'), website: f('f_web'), checkout_domain: f('f_dom') });
    if (error){ msg.textContent = error.message; msg.className='msg err'; return; }
    load();
  };
}

function pendingScreen(){
  app.innerHTML = `
  <div class="card" style="padding:18px;margin-top:14px;text-align:center">
    <div style="font-size:1.05rem;font-weight:800">Application received ✓</div>
    <p style="font-size:.78rem;color:var(--ink-soft);margin-top:8px;line-height:1.55">
      <b>${R.company_name}</b> is being verified. You'll be able to accept orders as soon as
      verification completes — usually within one working day.</p>
  </div>`;
}

/* ---------- verified dashboard ---------- */
async function dashboard(){
  const [markets, matches, ledger] = await Promise.all([
    getMarkets({ limit: 100 }), getSellerMatches(R.id), getLedger(R.id)]);
  const withDemand = markets.filter(m => (m.live_bids||0) > 0)
                            .sort((a,b) => (b.live_bids||0)-(a.live_bids||0));
  const pending = matches.filter(m => m.status === 'pending');

  app.innerHTML = `
  <div class="card acct-head">
    <div class="acct-avatar">${R.company_name.slice(0,1).toUpperCase()}</div>
    <div>
      <div class="acct-name">${R.company_name}</div>
      <div class="acct-email">Verified seller · fee ${(R.fee_rate_bps/100).toFixed(1)}% per accepted order</div>
    </div>
    <button class="linkbtn" onclick="signOut()">Sign out</button>
  </div>

  <div class="sec"><h2>Balance</h2></div>
  <div class="card" style="padding:14px;display:flex;align-items:center;gap:12px">
    <div><div style="font-size:1.5rem;font-weight:800" class="num">${P(R.balance_pence)}</div>
      <div style="font-size:.64rem;color:var(--ink-soft)">available for order fees</div></div>
    <div style="margin-left:auto;font-size:.68rem;color:var(--ink-soft);text-align:right;line-height:1.5">
      To top up, email <a href="mailto:sellers@openbook.co.uk">sellers@openbook.co.uk</a><br>
      with your company name — credited same day.</div>
  </div>

  <div class="sec"><h2>Live demand on the book</h2></div>
  <div class="card list" id="demand">
    ${withDemand.length ? withDemand.map(m => `
      <div class="lrow" style="cursor:pointer" data-pid="${m.product_id}" data-name="${m.name}">
        <div><div class="l-name">${m.name}</div>
          <div class="l-sub num">${m.live_bids} live order${m.live_bids===1?'':'s'} ·
            best ${m.best_bid_pence ? P(m.best_bid_pence) : '—'}
            ${m.retail_price_pence ? ' · retail ' + P(m.retail_price_pence) : ''}</div></div>
        <div class="l-right"><span class="pill live">View demand</span></div>
      </div>`).join('')
    : '<div class="empty">No live orders on the book yet. As buyers place orders, the demand appears here product by product.</div>'}
  </div>
  <div id="curvePanel"></div>

  <div class="sec"><h2>Orders to process</h2></div>
  <div class="card list">
    ${matches.length ? matches.map(m => {
      const pill = {pending:'pending',completed:'completed',ghosted:'ghosted'}[m.status] || 'ghosted';
      const lab  = {pending:'Awaiting buyer',completed:'Completed',ghosted:'Expired · fee refunded'}[m.status] || m.status;
      return `<div class="lrow">
        <div><div class="l-name">${m.products.name}</div>
          <div class="l-sub num">Ref ${m.match_ref} · ${fmtWhen(m.matched_at)}</div></div>
        <div class="l-right"><div class="l-price num">${P(m.price_pence)}</div>
          <span class="pill ${pill}">${lab}</span>
          ${m.status==='pending' ? `<div class="countdown num" id="cd-${m.id}"></div>` : ''}</div>
      </div>`; }).join('')
    : '<div class="empty">Accepted orders land here with the buyer\\'s deadline. The buyer pays on your site — fulfil it like any other order, referencing the OB ref.</div>'}
  </div>

  <div class="sec"><h2>Recent activity</h2></div>
  <div class="card list">
    ${ledger.length ? ledger.map(l => `
      <div class="lrow"><div><div class="l-sub">${l.note || l.kind}</div>
        <div class="l-sub num">${fmtWhen(l.created_at)}</div></div>
        <div class="l-right"><div class="l-price num" style="color:${l.amount_pence<0?'var(--sell-ink)':'var(--match)'}">
          ${l.amount_pence<0?'−':'+'}${P(Math.abs(l.amount_pence))}</div></div></div>`).join('')
    : '<div class="empty">Top-ups, fees and refunds appear here.</div>'}
  </div>`;

  timers.forEach(clearInterval); timers = [];
  pending.forEach(m => {
    const el = document.getElementById('cd-'+m.id); if (!el) return;
    const tick = () => {
      const left = Math.floor((new Date(m.expires_at) - Date.now())/1000);
      el.textContent = left > 0
        ? Math.floor(left/60)+':'+String(left%60).padStart(2,'0')+' left' : 'window closed';
    };
    tick(); timers.push(setInterval(tick,1000));
  });
  document.querySelectorAll('#demand .lrow[data-pid]').forEach(row => {
    row.onclick = () => openCurve(+row.dataset.pid, row.dataset.name);
  });
}

async function openCurve(pid, name){
  const panel = document.getElementById('curvePanel');
  panel.innerHTML = '<div class="card" style="padding:14px;margin-top:10px"><div class="empty">Loading demand…</div></div>';
  const curve = await getDemandCurve(pid);
  if (!curve.length){ panel.innerHTML=''; return; }
  curveCache[pid] = curve;
  const maxC = curve[curve.length-1].cume_bids;
  panel.innerHTML = `
  <div class="card" style="padding:14px;margin-top:10px">
    <div class="section-cap">${name} — accept orders down to…</div>
    <div id="levels" style="margin-top:8px">
      ${curve.map((l,i)=>`
        <div class="lrow" style="cursor:pointer;padding:8px 4px" data-i="${i}">
          <div class="num" style="font-weight:700;width:76px">${P(l.price_pence)}</div>
          <div style="flex:1;height:18px;background:#eef3f7;border-radius:5px;overflow:hidden">
            <div class="lvl-bar" style="height:100%;width:${Math.max(6,100*l.cume_bids/maxC)}%;background:var(--buy)"></div></div>
          <div class="num" style="width:88px;text-align:right;font-size:.72rem;color:var(--ink-soft)">
            ${l.cume_bids} orders</div>
        </div>`).join('')}
    </div>
    <div class="field" style="margin-top:12px">
      <label>Your checkout link for this product (https://…)</label>
      <input id="chk" placeholder="https://${(R.checkout_domain||'yourstore.co.uk')}/product-page">
    </div>
    <div class="field">
      <label>Max units (optional)</label>
      <input id="maxu" type="number" inputmode="numeric" placeholder="leave blank for all">
    </div>
    <button class="btn btn-buy" style="width:100%;margin-top:12px" id="acceptBtn" disabled>
      Tap a price level above</button>
    <div class="msg" id="am"></div>
  </div>`;
  let sel = null;
  const btn = document.getElementById('acceptBtn');
  panel.querySelectorAll('[data-i]').forEach(row => {
    row.onclick = () => {
      sel = curve[+row.dataset.i];
      panel.querySelectorAll('.lvl-bar').forEach((b,j) =>
        b.style.background = j <= +row.dataset.i ? 'var(--buy-strong)' : 'var(--buy)');
      const gross = sel.cume_gross_pence, fee = Math.floor(gross * R.fee_rate_bps / 10000);
      btn.disabled = false;
      btn.innerHTML = `Accept ${sel.cume_bids} orders · gross ${P(gross)}
        <small>fee ${P(fee)} from balance · refunded on no-shows</small>`;
    };
  });
  btn.onclick = async () => {
    const msg = document.getElementById('am'); msg.className='msg';
    const chk = document.getElementById('chk').value.trim();
    if (!chk.startsWith('https://')){ msg.textContent='Enter your full https:// checkout link.'; msg.className='msg err'; return; }
    const maxu = parseInt(document.getElementById('maxu').value) || null;
    btn.disabled = true;
    const { data, error } = await acceptOrders(pid, sel.price_pence, chk, maxu);
    btn.disabled = false;
    if (error){ msg.textContent = error.message; msg.className='msg err'; return; }
    if (data && data.error){ msg.textContent = data.error; msg.className='msg err'; return; }
    msg.textContent = `Done — ${data.accepted} orders accepted, ${P(data.fee_pence)} fee taken. Buyers are being notified now.`;
    msg.className='msg ok';
    setTimeout(load, 1600);
  };
}

/* ---------- boot ---------- */
async function load(){
  const { user, retailer } = await getRetailer();
  if (!user) return signInScreen();
  R = retailer;
  if (!R) return applyScreen();
  if (R.status !== 'verified') return pendingScreen();
  dashboard();
}
load();
</script>
</body>
</html>
