name: Daily retail price sweep
on:
  schedule:
    - cron: '50 5 * * *'
  workflow_run:
    workflows: ["Sync catalogue to Supabase"]
    types: [completed]
  push:
    paths: ['.sweep-trigger']
  workflow_dispatch:
    inputs:
      limit:
        description: 'Only sweep first N products (blank = all)'
        required: false
      dry_run:
        description: 'Dry run (no database writes)'
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: retail-sweep
  cancel-in-progress: true

jobs:
  sweep:
    runs-on: ubuntu-latest
    timeout-minutes: 28
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - name: Sweep retail prices
        env:
          DATAFORSEO_LOGIN: ${{ secrets.DATAFORSEO_LOGIN }}
          DATAFORSEO_PASSWORD: ${{ secrets.DATAFORSEO_PASSWORD }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          ARGS=""
          if [ -n "${{ github.event.inputs.limit }}" ]; then ARGS="--limit ${{ github.event.inputs.limit }}"; fi
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then ARGS="$ARGS --dry-run"; fi
          python3 sweep.py $ARGS
      - name: Regenerate pages with fresh prices
        run: python3 generate.py products.csv --domain https://openbook-pi.vercel.app
      - name: Commit receipt
        run: |
          git config user.name "sweep"
          git config user.email "sweep@openbook"
          git add -A || true
          git diff --cached --quiet || git commit -m "Sweep receipt"
          for i in 1 2 3 4 5; do
            git push && break
            git pull --rebase -X theirs origin main || true
          done
